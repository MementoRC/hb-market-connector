name: Security Scanning

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

# Deny all permissions by default; each job requests only what it needs.
permissions: {}

jobs:
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # CodeQL requires security-events: write to upload SARIF results.
      # This is the only job in this repo that receives this permission.
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: python
          build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4.35.2
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: +security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4.35.2
      with:
        category: "/language:${{matrix.language}}"

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install bandit

    - name: Run Bandit security scan
      run: |
        bandit -r market_connector/ -f json -o bandit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v7.0.1
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.2

    - name: Install detect-secrets
      run: pip install detect-secrets

    - name: Run secrets detection
      run: |
        detect-secrets scan --all-files > secrets-results.json
        if detect-secrets audit --report --json secrets-results.json 2>/dev/null | grep -q '"is_secret": true'; then
          echo "::error::Potential secrets detected! Please review secrets-results.json"
          exit 1
        fi

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [codeql, dependency-scan, secrets-scan]
    if: always()
    steps:
    - name: Security Status Summary
      env:
        CODEQL_RESULT: ${{ needs.codeql.result }}
        DEP_SCAN_RESULT: ${{ needs.dependency-scan.result }}
        SECRETS_RESULT: ${{ needs.secrets-scan.result }}
      run: |
        echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| CodeQL | $CODEQL_RESULT |" >> $GITHUB_STEP_SUMMARY
        echo "| Dependencies | $DEP_SCAN_RESULT |" >> $GITHUB_STEP_SUMMARY
        echo "| Secrets | $SECRETS_RESULT |" >> $GITHUB_STEP_SUMMARY

        if [[ "$CODEQL_RESULT" == "failure" || "$DEP_SCAN_RESULT" == "failure" || "$SECRETS_RESULT" == "failure" ]]; then
          echo "::error::One or more security scans failed. Please review the results."
          exit 1
        fi

  security-status:
    name: Security Scanning
    runs-on: ubuntu-latest
    permissions: {}
    needs: [codeql, dependency-scan, secrets-scan, security-summary]
    if: always()
    steps:
      - name: Report Security Status
        env:
          CODEQL_RESULT: ${{ needs.codeql.result }}
          DEP_SCAN_RESULT: ${{ needs.dependency-scan.result }}
          SECRETS_RESULT: ${{ needs.secrets-scan.result }}
        run: |
          if [[ "$CODEQL_RESULT" == "success" && "$DEP_SCAN_RESULT" == "success" && "$SECRETS_RESULT" == "success" ]]; then
            echo "All Security Scanning jobs passed"
            exit 0
          else
            echo "Some Security Scanning jobs failed"
            echo "CodeQL result: $CODEQL_RESULT"
            echo "Dependency scan result: $DEP_SCAN_RESULT"
            echo "Secrets scan result: $SECRETS_RESULT"
            exit 1
          fi
