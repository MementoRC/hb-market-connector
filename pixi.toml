[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12,<3.13"
pydantic = ">=2"
httpx = ">=0.27"
websockets = ">=12.0"

[feature.dev.dependencies]
pytest = ">=9.0.3"
pytest-asyncio = ">=0.21.0"
pytest-cov = ">=7.1.0"
pytest-timeout = ">=2.2.0"
ruff = ">=0.15.10"
mypy = ">=1.5.1"
pre-commit = ">=2.15.0"

[feature.ci.dependencies]
ruff = ">=0.15.10"
mypy = ">=1.5.1"
pytest = ">=9.0.3"
pytest-cov = ">=7.1.0"
pytest-timeout = ">=2.2.0"
bandit = ">=1.8.0"
pre-commit = ">=2.15.0"
hatchling = ">=1.18"

[feature.coinbase.dependencies]
pyjwt = ">=2.8"
cryptography = ">=41"

[feature.kraken.dependencies]
pyjwt = ">=2.8"
cryptography = ">=41"

[feature.interactive-brokers.pypi-dependencies]
ib_async = ">=1.0.1,<2.0.0"

[feature.py312.dependencies]
python = "3.12.*"

[environments]
default = { features = ["dev"], solve-group = "default" }
ci = { features = ["ci", "coinbase", "dev"], solve-group = "default" }
quality-ci = { features = ["ci", "coinbase", "dev"], solve-group = "default" }
coinbase = { features = ["coinbase", "dev"], solve-group = "default" }
kraken = { features = ["kraken", "dev"], solve-group = "default" }
interactive-brokers = { features = ["interactive-brokers", "dev"], solve-group = "default" }
py312 = { features = ["py312", "coinbase", "dev"], solve-group = "py312" }

[tasks]
kraken-symbol-audit = "python -m market_connector.exchanges.kraken.tools.symbol_audit"
test-kraken = "pytest tests/exchanges/kraken/ -v --tb=short"
test-kraken-specs = "pytest tests/exchanges/kraken/unit/test_specs.py -v --tb=long -p no:warnings"
test-kraken-factory = "pytest tests/exchanges/kraken/unit/test_factory.py -v --tb=long -p no:warnings"
test-kraken-vectors = "pytest tests/exchanges/kraken/unit/test_signature_vectors.py -v --tb=long -p no:warnings"
test-kraken-vectors-short = "pytest tests/exchanges/kraken/unit/test_signature_vectors.py -v --tb=line -p no:warnings"
test-kraken-vectors-log = "pytest tests/exchanges/kraken/unit/test_signature_vectors.py --tb=short -p no:warnings -q --junitxml=/tmp/kraken_vectors.xml"
lint-kraken = "ruff check market_connector/exchanges/kraken/ tests/exchanges/kraken/ --output-format=junit --output-file=/tmp/kraken_lint.xml"
lint-kraken-fix = "ruff check market_connector/exchanges/kraken/specs.py tests/exchanges/kraken/unit/test_signature_vectors.py --select=I --fix"
test = "pytest tests/"
test-unit = "pytest tests/unit/"
test-integration = "pytest tests/integration/"
test-conformance = "pytest tests/contract -v"
lint = "ruff check market_connector tests"
format = "ruff format market_connector tests"
format-check = "ruff format --check market_connector tests"
typecheck = "mypy market_connector"
build = "hatchling build"
quality = { depends-on = ["lint", "format-check"] }
check = { depends-on = ["quality", "typecheck", "test"] }
